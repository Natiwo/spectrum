<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <!-- Background -->
  <rect width="880" height="480" fill="#111" rx="8" />

  <!-- Title -->
  <text x="440" y="32" font-family="'IBM Plex Mono', 'SF Mono', monospace" font-size="13" fill="#888" text-anchor="middle" letter-spacing="3">ANTES vs DEPOIS</text>

  <!-- ═══ LEFT: Before ═══ -->
  <text x="215" y="62" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#ef4444" text-anchor="middle" letter-spacing="1">SEM SPECTRUM</text>

  <rect x="30" y="74" width="370" height="370" rx="4" fill="#0d0d0d" stroke="#333" stroke-width="1" />

  <!-- Scattered files -->
  <g font-family="'IBM Plex Mono', monospace">
    <!-- projeto-a -->
    <text x="50" y="100" font-size="10" fill="#888">~/projeto-a/</text>

    <rect x="60" y="108" width="140" height="22" rx="2" fill="#1a1a1a" stroke="#444" stroke-width="0.5" />
    <text x="70" y="123" font-size="9" fill="#ef4444">CLAUDE.md</text>
    <text x="160" y="123" font-size="7" fill="#555">desatualizado</text>

    <rect x="60" y="134" width="140" height="22" rx="2" fill="#1a1a1a" stroke="#444" stroke-width="0.5" />
    <text x="70" y="149" font-size="9" fill="#ef4444">SKILLS.md</text>
    <text x="148" y="149" font-size="7" fill="#555">carrega tudo</text>

    <rect x="60" y="160" width="140" height="22" rx="2" fill="#1a1a1a" stroke="#444" stroke-width="0.5" />
    <text x="70" y="175" font-size="9" fill="#ef4444">NOTES.md</text>
    <text x="143" y="175" font-size="7" fill="#555">onde salvei?</text>

    <rect x="60" y="186" width="140" height="22" rx="2" fill="#1a1a1a" stroke="#444" stroke-width="0.5" />
    <text x="70" y="201" font-size="9" fill="#ef4444">AGENTS.md</text>
    <text x="150" y="201" font-size="7" fill="#555">perdido</text>

    <!-- projeto-b -->
    <text x="50" y="230" font-size="10" fill="#888">~/projeto-b/</text>

    <rect x="60" y="238" width="140" height="22" rx="2" fill="#1a1a1a" stroke="#444" stroke-width="0.5" />
    <text x="70" y="253" font-size="9" fill="#ef4444">CONTEXT.md</text>
    <text x="158" y="253" font-size="7" fill="#555">copiado</text>

    <rect x="60" y="264" width="140" height="22" rx="2" fill="#1a1a1a" stroke="#444" stroke-width="0.5" />
    <text x="70" y="279" font-size="9" fill="#ef4444">README.md</text>
    <text x="147" y="279" font-size="7" fill="#555">6 meses atras</text>

    <!-- Documents -->
    <text x="50" y="310" font-size="10" fill="#888">~/Documents/</text>

    <rect x="60" y="318" width="170" height="22" rx="2" fill="#1a1a1a" stroke="#444" stroke-width="0.5" />
    <text x="70" y="333" font-size="9" fill="#ef4444">decisoes-tecnicas.md</text>

    <rect x="60" y="344" width="170" height="22" rx="2" fill="#1a1a1a" stroke="#444" stroke-width="0.5" />
    <text x="70" y="359" font-size="9" fill="#ef4444">anotacoes-random.md</text>

    <!-- Problems list -->
    <text x="240" y="108" font-size="9" fill="#ef4444">x</text>
    <text x="255" y="108" font-size="8" fill="#666">estatico, nao pesquisavel</text>

    <text x="240" y="128" font-size="9" fill="#ef4444">x</text>
    <text x="255" y="128" font-size="8" fill="#666">enche a janela de contexto</text>

    <text x="240" y="148" font-size="9" fill="#ef4444">x</text>
    <text x="255" y="148" font-size="8" fill="#666">cada projeto = arquivos novos</text>

    <text x="240" y="168" font-size="9" fill="#ef4444">x</text>
    <text x="255" y="168" font-size="8" fill="#666">ctrl+F rezando pra achar</text>

    <text x="240" y="188" font-size="9" fill="#ef4444">x</text>
    <text x="255" y="188" font-size="8" fill="#666">nao compartilha entre agentes</text>

    <text x="240" y="208" font-size="9" fill="#ef4444">x</text>
    <text x="255" y="208" font-size="8" fill="#666">skills carregadas sempre</text>
