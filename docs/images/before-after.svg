<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" width="860" height="540">
  <rect width="860" height="540" fill="#0f1117" rx="8" />

  <!-- Titulo -->
  <text x="430" y="30" font-family="monospace" font-size="12" fill="#888" text-anchor="middle" letter-spacing="2">ANTES vs DEPOIS</text>

  <!-- ESQUERDA: Sem Spectrum -->
  <text x="210" y="58" font-family="monospace" font-size="11" fill="#ef4444" text-anchor="middle" letter-spacing="1">SEM SPECTRUM</text>

  <rect x="30" y="70" width="380" height="380" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="1" />

  <g font-family="monospace">
    <!-- projeto-a -->
    <text x="50" y="96" font-size="10" fill="#888">~/projeto-a/</text>

    <rect x="60" y="104" width="200" height="22" rx="3" fill="#0f1117" stroke="#444" stroke-width="0.5" />
    <text x="70" y="119" font-size="9" fill="#ef4444">instruções.md</text>
    <text x="180" y="119" font-size="8" fill="#555">desatualizado</text>

    <rect x="60" y="130" width="200" height="22" rx="3" fill="#0f1117" stroke="#444" stroke-width="0.5" />
    <text x="70" y="145" font-size="9" fill="#ef4444">contexto.md</text>
    <text x="170" y="145" font-size="8" fill="#555">carrega tudo</text>

    <rect x="60" y="156" width="200" height="22" rx="3" fill="#0f1117" stroke="#444" stroke-width="0.5" />
    <text x="70" y="171" font-size="9" fill="#ef4444">notas.md</text>
    <text x="155" y="171" font-size="8" fill="#555">onde salvei?</text>

    <rect x="60" y="182" width="200" height="22" rx="3" fill="#0f1117" stroke="#444" stroke-width="0.5" />
    <text x="70" y="197" font-size="9" fill="#ef4444">skills.md</text>
    <text x="155" y="197" font-size="8" fill="#555">perdido</text>

    <!-- projeto-b -->
    <text x="50" y="226" font-size="10" fill="#888">~/projeto-b/</text>

    <rect x="60" y="234" width="200" height="22" rx="3" fill="#0f1117" stroke="#444" stroke-width="0.5" />
    <text x="70" y="249" font-size="9" fill="#ef4444">contexto.md</text>
    <text x="170" y="249" font-size="8" fill="#555">copiado</text>

    <rect x="60" y="260" width="200" height="22" rx="3" fill="#0f1117" stroke="#444" stroke-width="0.5" />
    <text x="70" y="275" font-size="9" fill="#ef4444">README.md</text>
    <text x="165" y="275" font-size="8" fill="#555">6 meses atrás</text>

    <!-- Documents -->
    <text x="50" y="304" font-size="10" fill="#888">~/Documents/</text>

    <rect x="60" y="312" width="200" height="22" rx="3" fill="#0f1117" stroke="#444" stroke-width="0.5" />
    <text x="70" y="327" font-size="9" fill="#ef4444">decisões-técnicas.md</text>

    <rect x="60" y="338" width="200" height="22" rx="3" fill="#0f1117" stroke="#444" stroke-width="0.5" />
    <text x="70" y="353" font-size="9" fill="#ef4444">anotações-random.md</text>

    <!-- Problemas (movidos pra baixo dos arquivos, dentro da caixa) -->
    <text x="50" y="382" font-size="8" fill="#ef4444">x</text>
    <text x="62" y="382" font-size="7" fill="#666">não pesquisável por significado</text>

    <text x="50" y="396" font-size="8" fill="#ef4444">x</text>
    <text x="62" y="396" font-size="7" fill="#666">entra inteiro na janela de contexto</text>

    <text x="50" y="410" font-size="8" fill="#ef4444">x</text>
    <text x="62" y="410" font-size="7" fill="#666">não compartilha entre agentes</text>

    <text x="50" y="424" font-size="8" fill="#ef4444">x</text>
    <text x="62" y="424" font-size="7" fill="#666">estático e desatualizado</text>

    <text x="230" y="382" font-size="8" fill="#ef4444">x</text>
    <text x="242" y="382" font-size="7" fill="#666">cada projeto = novos .md</text>

    <text x="230" y="396" font-size="8" fill="#ef4444">x</text>
    <text x="242" y="396" font-size="7" fill="#666">ctrl+F rezando pra achar</text>
  </g>

  <!-- Divisor -->
  <line x1="430" y1="52" x2="430" y2="506" stroke="#333" stroke-width="1" />

  <!-- DIREITA: Com Spectrum -->
  <text x="645" y="58" font-family="monospace" font-size="11" fill="#4ade80" text-anchor="middle" letter-spacing="1">COM SPECTRUM</text>

  <rect x="450" y="70" width="380" height="380" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="1" />

  <g font-family="monospace">
    <!-- Banco central -->
    <rect x="480" y="88" width="320" height="42" rx="4" fill="#0f1117" stroke="#7c3aed" stroke-width="1.5" />
    <text x="640" y="108" font-size="12" fill="#a78bfa" text-anchor="middle">~/.spectrum/spectrum.db</text>
    <text x="640" y="122" font-size="8" fill="#555" text-anchor="middle">SQLite WAL + embeddings 384D</text>

    <!-- Scopes -->
    <text x="480" y="152" font-size="9" fill="#7c3aed">scopes organizados:</text>

    <rect x="480" y="162" width="210" height="22" rx="3" fill="#0f1117" stroke="#4ade80" stroke-width="0.5" />
    <text x="490" y="177" font-size="9" fill="#4ade80">user/</text>
    <text x="540" y="177" font-size="8" fill="#666">preferências pessoais</text>

    <rect x="480" y="188" width="210" height="22" rx="3" fill="#0f1117" stroke="#4ade80" stroke-width="0.5" />
    <text x="490" y="203" font-size="9" fill="#4ade80">project:app/</text>
    <text x="586" y="203" font-size="8" fill="#666">stack, decisões</text>

    <rect x="480" y="214" width="210" height="22" rx="3" fill="#0f1117" stroke="#4ade80" stroke-width="0.5" />
    <text x="490" y="229" font-size="9" fill="#4ade80">session/</text>
    <text x="556" y="229" font-size="8" fill="#666">onde parei</text>

    <rect x="480" y="240" width="210" height="22" rx="3" fill="#0f1117" stroke="#4ade80" stroke-width="0.5" />
    <text x="490" y="255" font-size="9" fill="#4ade80">technical/</text>
    <text x="570" y="255" font-size="8" fill="#666">reutilizável</text>

    <!-- Beneficios -->
    <text x="710" y="164" font-size="9" fill="#4ade80">+</text>
    <text x="722" y="164" font-size="8" fill="#888">busca semântica</text>

    <text x="710" y="180" font-size="9" fill="#4ade80">+</text>
    <text x="722" y="180" font-size="8" fill="#888">sob demanda</text>

    <text x="710" y="196" font-size="9" fill="#4ade80">+</text>
    <text x="722" y="196" font-size="8" fill="#888">multi-agente</text>

    <text x="710" y="212" font-size="9" fill="#4ade80">+</text>
    <text x="722" y="212" font-size="8" fill="#888">todos projetos</text>

    <text x="710" y="228" font-size="9" fill="#4ade80">+</text>
    <text x="722" y="228" font-size="8" fill="#888">dinâmico</text>

    <text x="710" y="244" font-size="9" fill="#4ade80">+</text>
    <text x="722" y="244" font-size="8" fill="#888">100% local</text>

    <!-- Separador -->
    <line x1="480" y1="278" x2="790" y2="278" stroke="#333" stroke-width="0.5" />

    <!-- Agentes compartilhando -->
    <text x="480" y="300" font-size="9" fill="#7c3aed">3 agentes, 1 memória:</text>

    <rect x="480" y="312" width="96" height="28" rx="3" fill="#0f1117" stroke="#444" stroke-width="0.5" />
    <text x="528" y="330" font-size="9" fill="#ccc" text-anchor="middle">Claude</text>

    <rect x="586" y="312" width="96" height="28" rx="3" fill="#0f1117" stroke="#444" stroke-width="0.5" />
    <text x="634" y="330" font-size="9" fill="#ccc" text-anchor="middle">Gemini</text>

    <rect x="692" y="312" width="96" height="28" rx="3" fill="#0f1117" stroke="#444" stroke-width="0.5" />
    <text x="740" y="330" font-size="9" fill="#ccc" text-anchor="middle">Codex</text>

    <!-- MCP -->
    <text x="640" y="362" font-size="8" fill="#555" text-anchor="middle">conectados via MCP (protocolo aberto)</text>

    <!-- Spectrum Cloud callout -->
    <line x1="480" y1="378" x2="790" y2="378" stroke="#7c3aed" stroke-width="0.5" stroke-dasharray="4,3" />
    <text x="640" y="398" font-size="9" fill="#a78bfa" text-anchor="middle">Para produção: Spectrum Cloud</text>
    <text x="640" y="412" font-size="8" fill="#666" text-anchor="middle">API REST · busca híbrida · embeddings 1024D · multi-tenant</text>
    <text x="640" y="426" font-size="8" fill="#555" text-anchor="middle">mesma API, escalável para times e aplicações reais</text>
  </g>

  <!-- Comparação final -->
  <text x="210" y="524" font-family="monospace" font-size="9" fill="#ef4444" text-anchor="middle">10+ arquivos, 0 busca semântica</text>
  <text x="645" y="524" font-family="monospace" font-size="9" fill="#4ade80" text-anchor="middle">1 banco, busca por significado, todos agentes</text>
</svg>
