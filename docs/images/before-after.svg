    <text x="665" y="112" font-size="13" fill="#a78bfa" text-anchor="middle">~/.spectrum/spectrum.db</text>
    <text x="665" y="130" font-size="9" fill="#555" text-anchor="middle">SQLite WAL + embeddings 384D</text>

    <!-- Scopes -->
    <text x="510" y="168" font-size="9" fill="#7c3aed">scopes organizados:</text>

    <rect x="510" y="178" width="150" height="22" rx="2" fill="#1a1a1a" stroke="#4ade80" stroke-width="0.5" />
    <text x="520" y="193" font-size="9" fill="#4ade80">user/</text>
    <text x="566" y="193" font-size="8" fill="#666">preferencias</text>

    <rect x="510" y="204" width="150" height="22" rx="2" fill="#1a1a1a" stroke="#4ade80" stroke-width="0.5" />
    <text x="520" y="219" font-size="9" fill="#4ade80">project:app/</text>
    <text x="604" y="219" font-size="8" fill="#666">stack, decisoes</text>

    <rect x="510" y="230" width="150" height="22" rx="2" fill="#1a1a1a" stroke="#4ade80" stroke-width="0.5" />
    <text x="520" y="245" font-size="9" fill="#4ade80">session/</text>
    <text x="580" y="245" font-size="8" fill="#666">onde parei</text>

    <rect x="510" y="256" width="150" height="22" rx="2" fill="#1a1a1a" stroke="#4ade80" stroke-width="0.5" />
    <text x="520" y="271" font-size="9" fill="#4ade80">technical/</text>
    <text x="590" y="271" font-size="8" fill="#666">reutilizavel</text>

    <rect x="510" y="282" width="150" height="22" rx="2" fill="#1a1a1a" stroke="#4ade80" stroke-width="0.5" />
    <text x="520" y="297" font-size="9" fill="#4ade80">guardrails/</text>
    <text x="598" y="297" font-size="8" fill="#666">limites</text>

    <!-- Benefits -->
    <text x="690" y="193" font-size="9" fill="#4ade80">+</text>
    <text x="702" y="193" font-size="8" fill="#888">pesquisavel por significado</text>

    <text x="690" y="213" font-size="9" fill="#4ade80">+</text>
    <text x="702" y="213" font-size="8" fill="#888">sob demanda (nao enche contexto)</text>

    <text x="690" y="233" font-size="9" fill="#4ade80">+</text>
    <text x="702" y="233" font-size="8" fill="#888">compartilhado entre agentes</text>

    <text x="690" y="253" font-size="9" fill="#4ade80">+</text>
    <text x="702" y="253" font-size="8" fill="#888">um lugar, todos os projetos</text>

    <text x="690" y="273" font-size="9" fill="#4ade80">+</text>
    <text x="702" y="273" font-size="8" fill="#888">dinamico, atualiza em tempo real</text>

    <text x="690" y="293" font-size="9" fill="#4ade80">+</text>
    <text x="702" y="293" font-size="8" fill="#888">100% local, seus dados</text>

    <!-- Agents sharing -->
    <text x="580" y="334" font-size="9" fill="#7c3aed">3 agentes, 1 memoria:</text>

    <rect x="510" y="344" width="90" height="28" rx="3" fill="#1a1a1a" stroke="#444" stroke-width="0.5" />
    <text x="555" y="362" font-size="9" fill="#ccc" text-anchor="middle">Claude</text>

    <rect x="610" y="344" width="90" height="28" rx="3" fill="#1a1a1a" stroke="#444" stroke-width="0.5" />
    <text x="655" y="362" font-size="9" fill="#ccc" text-anchor="middle">Gemini</text>

    <rect x="710" y="344" width="90" height="28" rx="3" fill="#1a1a1a" stroke="#444" stroke-width="0.5" />
    <text x="755" y="362" font-size="9" fill="#ccc" text-anchor="middle">Codex</text>

    <!-- Connecting lines to DB -->
    <line x1="555" y1="344" x2="600" y2="142" stroke="#7c3aed" stroke-width="0.5" opacity="0.4" />
    <line x1="655" y1="344" x2="665" y2="142" stroke="#7c3aed" stroke-width="0.5" opacity="0.4" />
    <line x1="755" y1="344" x2="730" y2="142" stroke="#7c3aed" stroke-width="0.5" opacity="0.4" />
  </g>

  <!-- ═══ Bottom comparison ═══ -->
  <text x="215" y="465" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#ef4444" text-anchor="middle">10+ arquivos, 0 busca semantica</text>
  <text x="660" y="465" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#4ade80" text-anchor="middle">1 banco, busca por significado, todos agentes</text>
</svg>
