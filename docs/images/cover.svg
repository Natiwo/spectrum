<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="900" height="340">
  <rect width="900" height="340" fill="#0f1117" rx="8" />

  <!-- Titulo -->
  <text x="450" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#f0f0f0" text-anchor="middle" letter-spacing="-1">Spectrum</text>

  <!-- Linha -->
  <rect x="350" y="140" width="200" height="2" rx="1" fill="#7c3aed" />

  <!-- Subtitulo -->
  <text x="450" y="180" font-family="system-ui, sans-serif" font-size="20" fill="#a78bfa" text-anchor="middle">Memoria Semantica Persistente para IA</text>

  <!-- Tech tags -->
  <g font-family="'SF Mono', 'Fira Code', monospace" font-size="13" fill="#666">
    <text x="450" y="220" text-anchor="middle">SQLite  ·  Embeddings 384D  ·  MCP  ·  100% Local</text>
  </g>

  <!-- Badges -->
  <g transform="translate(450, 270)">
    <rect x="-145" y="-14" width="100" height="28" rx="14" fill="none" stroke="#7c3aed" stroke-width="1" />
    <text x="-95" y="5" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="middle">npm + pip</text>

    <rect x="-35" y="-14" width="100" height="28" rx="14" fill="none" stroke="#7c3aed" stroke-width="1" />
    <text x="15" y="5" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="middle">MIT License</text>

    <rect x="75" y="-14" width="100" height="28" rx="14" fill="none" stroke="#7c3aed" stroke-width="1" />
    <text x="125" y="5" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="middle">Open Source</text>
  </g>

  <!-- Footer -->
  <text x="450" y="320" font-family="system-ui, sans-serif" font-size="12" fill="#444" text-anchor="middle">github.com/Natiwo/spectrum</text>
</svg>
