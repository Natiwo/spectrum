<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" width="860" height="380">
  <rect width="860" height="380" fill="#0f1117" rx="8" />

  <!-- Titulo -->
  <text x="430" y="30" font-family="monospace" font-size="12" fill="#888" text-anchor="middle" letter-spacing="2">POR QUE A IA ESQUECE TUDO</text>

  <!-- SESSAO 1 -->
  <text x="200" y="60" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="middle">SESSAO 1</text>

  <!-- Mesa cheia -->
  <rect x="30" y="72" width="340" height="120" rx="6" fill="#1a1a2e" stroke="#333" stroke-width="1" />
  <text x="200" y="90" font-family="monospace" font-size="9" fill="#555" text-anchor="middle">janela de contexto (128k tokens)</text>

  <!-- Blocos de tokens -->
  <rect x="42" y="100" width="56" height="20" rx="3" fill="#7c3aed" opacity="0.8" />
  <text x="70" y="114" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle">projeto</text>

  <rect x="102" y="100" width="48" height="20" rx="3" fill="#7c3aed" opacity="0.7" />
  <text x="126" y="114" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle">stack</text>

  <rect x="154" y="100" width="60" height="20" rx="3" fill="#7c3aed" opacity="0.6" />
  <text x="184" y="114" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle">decisoes</text>

  <rect x="218" y="100" width="60" height="20" rx="3" fill="#7c3aed" opacity="0.5" />
  <text x="248" y="114" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle">dialogo</text>

  <rect x="282" y="100" width="76" height="20" rx="3" fill="#7c3aed" opacity="0.4" />
  <text x="320" y="114" font-family="monospace" font-size="8" fill="#eee" text-anchor="middle">preferencias</text>

  <rect x="42" y="126" width="72" height="20" rx="3" fill="#a78bfa" opacity="0.4" />
  <text x="78" y="140" font-family="monospace" font-size="8" fill="#eee" text-anchor="middle">codigo</text>

  <rect x="118" y="126" width="80" height="20" rx="3" fill="#a78bfa" opacity="0.35" />
  <text x="158" y="140" font-family="monospace" font-size="8" fill="#eee" text-anchor="middle">debug</text>

  <rect x="202" y="126" width="80" height="20" rx="3" fill="#a78bfa" opacity="0.3" />
  <text x="242" y="140" font-family="monospace" font-size="8" fill="#ddd" text-anchor="middle">3h trabalho</text>

  <text x="200" y="180" font-family="monospace" font-size="10" fill="#4ade80" text-anchor="middle">tudo acessivel na sessao</text>

  <!-- Seta: fecha sessao -->
  <text x="430" y="125" font-family="monospace" font-size="10" fill="#ef4444" text-anchor="middle">fecha</text>
  <line x1="395" y1="130" x2="465" y2="130" stroke="#ef4444" stroke-width="1.5" />
  <polygon points="465,127 472,130 465,133" fill="#ef4444" />

  <!-- SESSAO 2 -->
  <text x="660" y="60" font-family="monospace" font-size="11" fill="#ef4444" text-anchor="middle">SESSAO 2</text>

  <!-- Mesa vazia -->
  <rect x="490" y="72" width="340" height="120" rx="6" fill="#1a1a2e" stroke="#ef4444" stroke-width="1" stroke-dasharray="6,3" />
  <text x="660" y="90" font-family="monospace" font-size="9" fill="#555" text-anchor="middle">janela de contexto (128k tokens)</text>

  <text x="660" y="140" font-family="monospace" font-size="18" fill="#333" text-anchor="middle">vazio</text>
  <text x="660" y="180" font-family="monospace" font-size="10" fill="#ef4444" text-anchor="middle">comeca tudo do zero</text>

  <!-- Separador -->
  <line x1="30" y1="215" x2="830" y2="215" stroke="#333" stroke-width="0.5" />

  <!-- COM SPECTRUM -->
  <text x="430" y="240" font-family="monospace" font-size="11" fill="#4ade80" text-anchor="middle" letter-spacing="2">COM SPECTRUM</text>

  <!-- Fluxo linear -->
  <rect x="30" y="258" width="190" height="44" rx="6" fill="#1a1a2e" stroke="#333" stroke-width="1" />
  <text x="125" y="278" font-family="monospace" font-size="10" fill="#ccc" text-anchor="middle">Sessao 1: trabalha</text>
  <text x="125" y="293" font-family="monospace" font-size="9" fill="#555" text-anchor="middle">contexto + decisoes</text>

  <!-- Seta save -->
  <line x1="220" y1="280" x2="290" y2="280" stroke="#4ade80" stroke-width="1.5" />
  <polygon points="290,277 297,280 290,283" fill="#4ade80" />
  <text x="255" y="272" font-family="monospace" font-size="8" fill="#4ade80" text-anchor="middle">salva</text>

  <!-- Spectrum -->
  <rect x="300" y="254" width="260" height="92" rx="6" fill="#1a1a2e" stroke="#7c3aed" stroke-width="1.5" />
  <text x="430" y="276" font-family="monospace" font-size="12" fill="#a78bfa" text-anchor="middle">Spectrum</text>
  <line x1="315" y1="284" x2="545" y2="284" stroke="#333" stroke-width="0.5" />
  <text x="320" y="300" font-family="monospace" font-size="9" fill="#666">project:app/stack</text>
  <text x="320" y="314" font-family="monospace" font-size="9" fill="#666">project:app/decisoes</text>
  <text x="320" y="328" font-family="monospace" font-size="9" fill="#666">session/2026-03-13</text>
  <text x="320" y="342" font-family="monospace" font-size="9" fill="#555">busca por significado</text>

  <!-- Seta recall -->
  <line x1="560" y1="280" x2="630" y2="280" stroke="#4ade80" stroke-width="1.5" />
  <polygon points="630,277 637,280 630,283" fill="#4ade80" />
  <text x="595" y="272" font-family="monospace" font-size="8" fill="#4ade80" text-anchor="middle">busca</text>

  <!-- Sessao 2 com contexto -->
  <rect x="640" y="258" width="190" height="44" rx="6" fill="#1a1a2e" stroke="#4ade80" stroke-width="1" />
  <text x="735" y="278" font-family="monospace" font-size="10" fill="#ccc" text-anchor="middle">Sessao 2: continua</text>
  <text x="735" y="293" font-family="monospace" font-size="9" fill="#4ade80" text-anchor="middle">contexto recuperado</text>

  <!-- Rodape -->
  <text x="430" y="372" font-family="monospace" font-size="9" fill="#444" text-anchor="middle">a mesa limpa entre sessoes — Spectrum e o caderno que fica na gaveta</text>
</svg>
